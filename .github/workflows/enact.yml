name: enact-process-environment
on:
  workflow_dispatch:

jobs:
  posix:
    name: POSIX envp on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Compile POSIX harness
        shell: bash
        run: cc -Wall -Wextra -pedantic -std=c99 posix-envp-enactment.c -o posix-envp-enactment
      - name: Run and assert POSIX envp behavior
        shell: bash
        run: |
          set -euo pipefail
          ./posix-envp-enactment seed-edge | tee posix-edge.txt
          grep -Fx '000:some-other=values' posix-edge.txt
          grep -Fx '001:NAME+some-other=value+values' posix-edge.txt
          grep -Fx '002:=empty-name' posix-edge.txt
          grep -Fx '003:noequals' posix-edge.txt
          grep -Fx '004:name=value=with=equals' posix-edge.txt
          grep -Fx '005:dup=one' posix-edge.txt
          grep -Fx '006:dup=two' posix-edge.txt
          grep -Fx '007:NAME=value' posix-edge.txt
          if grep -F 'TAIL=x' posix-edge.txt; then exit 1; fi

          ./posix-envp-enactment seed-basic replicate | tee posix-replicate.txt
          diff -u <(printf '000:third=3\n001:first=1\n002:second=2\n') posix-replicate.txt

          ./posix-envp-enactment seed-basic append | tee posix-append.txt
          diff -u <(printf '000:third=3\n001:first=1\n002:second=2\n003:added=entry\n') posix-append.txt

          ./posix-envp-enactment seed-basic omit | tee posix-omit.txt
          diff -u <(printf '000:third=3\n001:second=2\n') posix-omit.txt

          ./posix-envp-enactment seed-basic replace | tee posix-replace.txt
          diff -u <(printf '000:third=3\n001:second=2\n002:first=replaced\n') posix-replace.txt

          cat posix-edge.txt posix-replicate.txt posix-append.txt posix-omit.txt posix-replace.txt > posix-output.txt
          shasum -a 256 posix-output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: posix-${{ matrix.os }}-output
          path: |
            posix-*.txt

  windows:
    name: Windows lpEnvironment on windows-latest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile and run Windows harness
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VSPATH=%%i
          call "%VSPATH%\VC\Auxiliary\Build\vcvars64.bat"
          cl /W4 /DUNICODE /D_UNICODE windows-lpenvironment-enactment.c
          windows-lpenvironment-enactment.exe > windows-output.txt
          type windows-output.txt
          powershell -NoProfile -Command "(Get-FileHash windows-output.txt -Algorithm SHA256).Hash.ToLower()"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-output
          path: windows-output.txt
